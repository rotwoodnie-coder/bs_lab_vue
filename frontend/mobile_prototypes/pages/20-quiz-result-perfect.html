<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>答题结果 · 全对 · 宝山区小实验社区</title>
  <link rel="stylesheet" href="../css/prototype.css">
</head>
<body>
<div class="prototype-container pad-shell safe-top safe-bottom" data-layout="detail">

  <div class="topbar page-topbar safe-top">
    <a href="10-tasks.html" class="icon-btn page-back" aria-label="返回">
      <i data-lucide="arrow-left" class="icon"></i>
    </a>
    <h1 class="topbar-title">答题结果</h1>
  </div>

  <div class="px-4 mt-3">
    <div class="quiz-result-hero quiz-result-hero--perfect">
      <div class="text-4xl mb-2">🎉</div>
      <div class="quiz-result-hero__score text-success">5 / 5</div>
      <p class="text-base font-bold mt-2">今日全对！太棒了</p>
      <p class="text-sm muted mt-1">连对天数 +1 · 已连续答对 <strong>4</strong> 天</p>
      <div class="row gap-2 justify-center mt-4 flex-wrap">
        <span class="badge badge-success">+10 积分（答题）</span>
        <span class="badge badge-success">+10 积分（全对奖励）</span>
      </div>
    </div>
  </div>

  <div class="px-4 mt-4 stack-3">
    <div class="card card-pad">
      <h2 class="text-sm font-bold mb-2">本次统计</h2>
      <div class="grid-3 gap-2 text-center">
        <div class="surface-2 rounded-xl p-3"><div class="text-lg font-bold text-success">5</div><div class="text-xs muted">答对</div></div>
        <div class="surface-2 rounded-xl p-3"><div class="text-lg font-bold">0</div><div class="text-xs muted">答错</div></div>
        <div class="surface-2 rounded-xl p-3"><div class="text-lg font-bold text-warning">+20</div><div class="text-xs muted">获得积分</div></div>
      </div>
    </div>

    <div class="card card-pad tint-green">
      <p class="text-sm"><strong>错题处理：</strong>本次无错题。明日 0:00 刷新新一轮每日答题。</p>
    </div>

    <a href="19-badge-wall.html" class="card card-pad card-link row items-center gap-3">
      <div class="tile-icon tile-sm tint-violet">🏅</div>
      <div class="flex-1"><div class="text-sm font-bold">答题王者进度 12 / 20</div><p class="text-xs muted mt-1">再答对 8 题即可解锁勋章</p></div>
      <i data-lucide="chevron-right" class="icon muted-2"></i>
    </a>

    <a href="20-quiz.html?mode=practice" class="btn btn-outline btn-block">再做一遍练习（不计分）</a>
    <a href="20-quiz-history.html" class="btn btn-soft btn-block">查看答题记录</a>
    <a href="03-home-primary.html" class="btn btn-gradient btn-block btn-lg">返回首页</a>
  </div>

  <nav class="bottom-nav" aria-label="主导航">
    <div class="nav-items">
      <a href="03-home-primary.html" class="nav-item"><span class="nav-icon"><i data-lucide="house" class="icon"></i></span><span class="nav-label">首页</span></a>
      <a href="10-tasks.html" class="nav-item active"><span class="nav-icon"><i data-lucide="clipboard-list" class="icon"></i></span><span class="nav-label">我的任务</span></a>
      <a href="15-profile-student.html" class="nav-item"><span class="nav-icon nav-icon--avatar"><span class="avatar avatar-sm avatar-grad-warm nav-avatar">张</span></span><span class="nav-label">我的</span></a>
    </div>
  </nav>
</div>
<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../js/prototype.js"></script>
</body>
</html>
