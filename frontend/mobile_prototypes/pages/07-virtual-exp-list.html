  <style>
    /* ── P07 使用和首页相同的瀑布流 + 搜索/筛选布局 ── */
    .pad-explore__waterfall {
      column-count: 1;
      column-gap: var(--space-3);
    }
    .pad-explore__waterfall > * {
      break-inside: avoid;
      display: inline-block;
      width: 100%;
      margin-bottom: var(--space-3);
    }
    .pad-explore__waterfall > .waterfall-card.is-exp-hidden,
    .pad-explore__waterfall > .waterfall-card[hidden] {
      display: none !important;
    }
    .exp-empty {
      column-span: all;
      width: 100%;
      padding: 32px 16px;
      text-align: center;
      color: var(--color-text-3);
      font-size: var(--text-sm);
    }

    @media (max-width: 767px) and (orientation: landscape) {
      .pad-explore__waterfall { column-count: 1; }
      .pad-explore__waterfall .waterfall-card {
        display: grid;
        grid-template-columns: 240px minmax(0, 1fr);
        border-radius: var(--radius-lg);
        overflow: hidden;
      }
      .pad-explore__waterfall .waterfall-card .video-card__media { border-radius: 0; }
      .pad-explore__waterfall .waterfall-card .video-card__body { padding: var(--space-3) var(--space-4); }
    }
    @media (min-width: 768px) and (orientation: portrait) {
      .pad-explore__waterfall { column-count: 2; column-gap: var(--space-4); }
      .pad-explore__waterfall > * { margin-bottom: var(--space-4); }
    }
    @media (min-width: 768px) and (orientation: landscape) {
      .pad-explore__waterfall { column-count: 3; column-gap: var(--space-4); }
      .pad-explore__waterfall > * { margin-bottom: var(--space-4); }
    }
  </style>
