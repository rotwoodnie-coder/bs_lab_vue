<div class="prototype-container pad-shell safe-top safe-bottom" data-layout="detail">

        <li>去「石头老师」提问薄弱知识点</li>
        <li>明日 0:00 新一轮每日答题再挑战</li>

    <a href="20-quiz.html?mode=practice" class="btn btn-outline btn-block">重做练习（不计分）</a>
