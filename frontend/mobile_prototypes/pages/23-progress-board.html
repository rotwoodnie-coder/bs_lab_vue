<script>
function updateBoard() {
  var rates = [75, 62, 88, 71];
  var total = [36, 34, 35, 35];
  var selects = document.querySelectorAll('.pad-teacher__mobile-only select, .pad-workbench__filters select');
  var classIdx = selects[0] ? selects[0].selectedIndex : 0;
  var rate = rates[classIdx] || 75;
  var t = total[classIdx] || 36;
  var submitted = Math.round(t * rate / 100);
  var unsubmitted = t - submitted;

  ['ringChart', 'ringChartMobile'].forEach(function(id) {
    var ring = document.getElementById(id);
    if (!ring) return;
    ring.style.background = 'conic-gradient(var(--brand) 0% ' + rate + '%, var(--color-border) ' + rate + '% 100%)';
    var pct = ring.querySelector('.text-2xl');
    if (pct) pct.textContent = rate + '%';
  });

  var padCards = document.querySelectorAll('.pad-teacher__feed .grid-3 .text-xl');
  if (padCards.length >= 3) {
    padCards[0].textContent = t;
    padCards[1].textContent = submitted;
    padCards[2].textContent = unsubmitted;
  }

  document.querySelectorAll('.board-total').forEach(function(el) { el.textContent = t; });
  document.querySelectorAll('.board-submitted').forEach(function(el) { el.textContent = submitted; });
  document.querySelectorAll('.board-unsubmitted').forEach(function(el) { el.textContent = unsubmitted; });
  document.querySelectorAll('.board-unsubmitted-label').forEach(function(el) { el.textContent = '⏳ 未提交（' + unsubmitted + '人）'; });
  document.querySelectorAll('.board-submitted-label').forEach(function(el) { el.textContent = '✅ 已提交（' + submitted + '人）'; });

  var padUnsubmitted = document.querySelector('.pad-teacher__feed .text-danger.font-bold');
  var padSubmitted = document.querySelector('.pad-teacher__feed .text-success.font-bold');
  if (padUnsubmitted) padUnsubmitted.textContent = '⏳ 未提交（' + unsubmitted + '人）';
  if (padSubmitted) padSubmitted.textContent = '✅ 已提交（' + submitted + '人）';
}

document.addEventListener('DOMContentLoaded', updateBoard);
</script>
