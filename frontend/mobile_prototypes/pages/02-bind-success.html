<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>绑定申请 · 宝山区小实验社区</title>
  <link rel="stylesheet" href="../css/prototype.css">
  <style>
    .screen.pad-success {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #fef3c7 0%, #f1f5f9 45%);
      padding: var(--space-5);
      position: relative;
      overflow: hidden;
    }

    .success-split {
      width: 100%;
      max-width: 380px;
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-xl);
      padding: var(--space-6) var(--space-5) var(--space-5);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .success-split__heading {
      display: none;
    }

    .title-emoji {
      font-size: 56px;
      line-height: 1;
      display: block;
      margin-bottom: var(--space-3);
      animation: emojiPop 0.6s var(--ease) 0.1s both;
    }
    @keyframes emojiPop {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(4deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .success-title {
      font-size: var(--text-2xl);
      font-weight: var(--weight-bold);
      margin-bottom: var(--space-1);
      animation: fadeUp 0.5s var(--ease) 0.35s both;
    }
    .success-sub {
      font-size: var(--text-sm);
      color: var(--color-text-2);
      margin-bottom: var(--space-5);
      animation: fadeUp 0.5s var(--ease) 0.45s both;
    }

    .child-card {
      background: var(--color-surface-2);
      border-radius: var(--radius-lg);
      padding: var(--space-5);
      margin-bottom: 0;
      border: 1px solid var(--color-border-soft);
      animation: fadeUp 0.5s var(--ease) 0.55s both;
    }
    .child-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--gradient-amber-rose);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-3);
      font-size: 30px;
      font-weight: var(--weight-bold);
      color: #fff;
      box-shadow: 0 4px 16px rgba(217, 119, 6, 0.24);
    }
    .child-name {
      font-size: var(--text-xl);
      font-weight: var(--weight-bold);
    }
    .child-class {
      font-size: var(--text-xs);
      color: var(--color-text-3);
      margin-top: var(--space-1);
    }
    .child-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: var(--space-3);
      padding: 5px 14px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
    }
    .child-badge .badge-icon { width: 14px; height: 14px; }
    .child-badge.badge-pending {
      background: var(--c-amber-100);
      color: var(--c-amber-600);
    }
    .child-badge.badge-approved {
      background: var(--c-emerald-100);
      color: var(--c-emerald-600);
    }
    .child-badge.badge-rejected {
      background: var(--c-rose-100);
      color: var(--c-rose-600);
    }

    /* ── 审核状态卡片 ── */
    .audit-card {
      text-align: left;
      padding: var(--space-4);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border-soft);
      animation: fadeUp 0.5s var(--ease) 0.55s both;
    }
    .audit-card.audit-pending { background: var(--c-amber-100); border-color: var(--c-amber-200); }
    .audit-card.audit-approved { background: var(--c-emerald-100); border-color: var(--c-emerald-200); }
    .audit-card.audit-rejected { background: var(--c-rose-100); border-color: var(--c-rose-200); }

    .audit-card__status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
    }
    .audit-card.audit-pending .audit-card__status { background: var(--c-amber-200); color: var(--c-amber-700); }
    .audit-card.audit-approved .audit-card__status { background: var(--c-emerald-200); color: var(--c-emerald-700); }
    .audit-card.audit-rejected .audit-card__status { background: var(--c-rose-200); color: var(--c-rose-700); }

    .audit-card__title {
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      margin-bottom: var(--space-1);
    }
    .audit-card__desc {
      font-size: var(--text-xs);
      line-height: 1.5;
      opacity: 0.85;
    }
    .audit-card__reason {
      margin-top: var(--space-2);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-sm);
      background: rgba(0,0,0,0.05);
      font-size: var(--text-xs);
      line-height: 1.4;
    }

    /* ── 申请记录列表 ── */
    .apply-list {
      animation: fadeUp 0.5s var(--ease) 0.6s both;
    }
    .apply-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      background: var(--color-surface-2);
      border: 1px solid var(--color-border-soft);
    }
    .apply-item + .apply-item {
      margin-top: var(--space-2);
    }
    .apply-item__info {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      min-width: 0;
    }
    .apply-item__avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: var(--weight-bold);
      color: #fff;
      flex-shrink: 0;
      background: var(--gradient-amber-rose);
    }
    .apply-item__name {
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      color: var(--color-text-1);
    }
    .apply-item__class {
      font-size: var(--text-xs);
      color: var(--color-text-3);
      margin-top: 1px;
    }
    .apply-item__badge {
      flex-shrink: 0;
    }

    .actions { animation: fadeUp 0.5s var(--ease) 0.75s both; }
    .actions .btn + .btn,
    .actions .btn-secondary-action + .btn { margin-top: var(--space-2); }

    .btn-secondary-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      background: var(--color-surface-2);
      color: var(--color-text-2);
      font-size: var(--text-sm);
      font-weight: var(--weight-medium);
      cursor: pointer;
      transition: all var(--dur-fast) var(--ease);
      border: 1px solid var(--color-border-soft);
      text-decoration: none;
    }
    .btn-secondary-action:active { transform: scale(0.98); background: var(--color-border); }
    .btn-secondary-action .action-icon { width: 18px; height: 18px; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
    }

    /* ── 无申请记录空状态 ── */
    .empty-state-sm {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-6) var(--space-4);
      color: var(--color-text-3);
    }
    .empty-state-sm .empty-icon { font-size: 32px; margin-bottom: var(--space-2); }
    .empty-state-sm .empty-text { font-size: var(--text-xs); }
  </style>
</head>
<body>

<div class="screen pad-success" id="screen" data-layout="bind-success-split">

  <div class="confetti-container" id="confettiContainer"></div>

  <div class="success-split">
    <section class="success-split__left">
      <!-- 标题区域通过 JS 动态渲染 -->
      <div id="statusHeader"></div>

      <!-- 孩子信息卡片 -->
      <div id="childCardContainer"><!-- JS 渲染 --></div>

      <!-- 绑定申请列表 -->
      <div class="apply-list stack-2 mb-4" id="applyListContainer">
        <div class="text-xs font-semibold muted-2 text-left">绑定申请记录</div>
        <div id="applyList"><!-- JS 渲染 --></div>
      </div>
    </section>

    <section class="success-split__right">
      <div class="actions" id="actionsContainer"><!-- JS 渲染 --></div>
    </section>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
<script src="../js/prototype.js"></script>
<script>
(function () {
  'use strict';

  /* ── 读取 URL 参数 ── */
  var params = new URLSearchParams(window.location.search);
  var status   = params.get('status') || 'pending';        // pending | approved | rejected
  var school   = params.get('school') || '实验小学';
  var grade    = params.get('grade') || '三年级';
  var cls      = params.get('class') || '一班';
  var name     = params.get('name') || '小明';
  var from     = params.get('from') || '';                  // 'register' 来自自助注册

  /* ── 状态文案映射 ── */
  var STATUS_MAP = {
    pending: {
      emoji: '⏳',
      title: '申请已提交',
      subtitle: '绑定学生申请已经发送，等待学校审核结果',
      cardClass: 'audit-pending',
      badgeClass: 'badge-pending',
      badgeText: '审核中',
      badgeIcon: 'clock',
      cardTitle: '审核中',
      cardDesc: '绑定学生申请已经发送，请等待学校审核结果。审核通过后您将收到短信通知。',
      showConfetti: false
    },
    approved: {
      emoji: '🎉',
      title: '审核通过！',
      subtitle: '绑定申请已通过审核，您可以开始使用家长端全部功能',
      cardClass: 'audit-approved',
      badgeClass: 'badge-approved',
      badgeText: '已通过',
      badgeIcon: 'check-circle',
      cardTitle: '审核已通过',
      cardDesc: '绑定申请已通过学校审核，现在您可以查看孩子的学习情况了。',
      showConfetti: true
    },
    rejected: {
      emoji: '😔',
      title: '审核未通过',
      subtitle: '绑定申请未通过审核，请联系学校确认信息后重新提交',
      cardClass: 'audit-rejected',
      badgeClass: 'badge-rejected',
      badgeText: '已拒绝',
      badgeIcon: 'x-circle',
      cardTitle: '审核未通过',
      cardDesc: '您的绑定申请未通过学校审核，可能的原因是信息不准确或不完整。',
      showConfetti: false
    }
  };

  var s = STATUS_MAP[status] || STATUS_MAP.pending;

  /* ── 渲染标题区域 ── */
  function renderHeader() {
    var header = document.getElementById('statusHeader');
    header.innerHTML =
      '<span class="title-emoji">' + s.emoji + '</span>' +
      '<h1 class="success-title">' + s.title + '</h1>' +
      '<p class="success-sub">' + s.subtitle + '</p>';
  }

  /* ── 渲染审核状态卡片 ── */
  function renderAuditCard() {
    var container = document.getElementById('childCardContainer');
    var reasonHtml = '';
    if (status === 'rejected') {
      reasonHtml =
        '<div class="audit-card__reason">' +
          '<span class="font-medium">拒绝原因：</span>填写的学生信息与学校记录不匹配，请核实后重新提交。' +
        '</div>';
    }
    var statusIconHtml = '<i data-lucide="' + s.badgeIcon + '" class="icon badge-icon" style="width:14px;height:14px;"></i>';

    container.innerHTML =
      '<div class="audit-card ' + s.cardClass + '">' +
        '<div class="row items-center justify-between mb-2">' +
          '<div class="audit-card__title">' + s.cardTitle + '</div>' +
          '<span class="audit-card__status">' + statusIconHtml + '<span>' + s.badgeText + '</span></span>' +
        '</div>' +
        '<div class="audit-card__desc">' + s.cardDesc + '</div>' +
        (status === 'pending' ? '<div class="mt-2 text-xs" style="opacity:0.7;">预计 1-3 个工作日</div>' : '') +
        reasonHtml +
      '</div>' +
      /* 孩子信息卡片 */
      '<div class="child-card mt-3">' +
        '<div class="child-avatar" id="avatarLetter">' + name.charAt(0) + '</div>' +
        '<div class="child-name" id="childNameDisplay">' + name + '</div>' +
        '<div class="child-class" id="childClassDisplay">' + school + ' · ' + grade + cls + '</div>' +
        '<div class="child-badge ' + s.badgeClass + '">' +
          statusIconHtml +
          '<span>' + s.badgeText + '</span>' +
        '</div>' +
      '</div>';

    if (window.lucide) window.lucide.createIcons();
  }

  /* ── 渲染申请记录列表 ── */
  function renderApplyList() {
    var list = document.getElementById('applyList');
    var statusIconHtml = '<i data-lucide="' + s.badgeIcon + '" class="icon" style="width:14px;height:14px;"></i>';

    list.innerHTML =
      '<div class="apply-item">' +
        '<div class="apply-item__info">' +
          '<div class="apply-item__avatar">' + name.charAt(0) + '</div>' +
          '<div>' +
            '<div class="apply-item__name">' + name + '</div>' +
            '<div class="apply-item__class">' + school + ' · ' + grade + cls + '</div>' +
          '</div>' +
        '</div>' +
        '<span class="apply-item__badge badge ' +
          (status === 'approved' ? 'badge-success' : status === 'rejected' ? 'badge-danger' : 'badge-warning') + '">' +
          statusIconHtml +
          '<span>' + s.badgeText + '</span>' +
        '</span>' +
      '</div>';

    if (window.lucide) window.lucide.createIcons();
  }

  /* ── 渲染底部操作按钮 ── */
  function renderActions() {
    var container = document.getElementById('actionsContainer');

    var addChildHtml =
      '<a href="01-bind-child.html" class="btn btn-outline btn-block btn-lg btn-secondary-action">' +
        '<i data-lucide="user-plus" class="icon action-icon"></i>' +
        '<span>新增绑定孩子</span>' +
      '</a>';

    if (status === 'approved') {
      container.innerHTML =
        addChildHtml +
        '<a href="05-home-parent.html" class="btn btn-gradient btn-block btn-lg">进入首页</a>';
    } else {
      container.innerHTML = addChildHtml;
      // 审核未通过/审核中 — 不显示"进入首页"
    }

    if (window.lucide) window.lucide.createIcons();
  }

  /* ── 五彩纸屑（仅审核通过） ── */
  function createConfetti() {
    if (!s.showConfetti) return;
    var colours = ['#f59e0b', '#e11d48', '#3b82f6', '#10b981', '#8b5cf6', '#ec4899',
                   '#f97316', '#06b6d4', '#84cc16', '#d946ef'];
    var container = document.getElementById('confettiContainer');
    for (var i = 0; i < 60; i++) {
      var piece = document.createElement('div');
      piece.className = 'confetti-piece';
      var color = colours[Math.floor(Math.random() * colours.length)];
      var left = Math.random() * 100;
      var size = 6 + Math.random() * 8;
      var duration = 2 + Math.random() * 3;
      var delay = Math.random() * 1.2;
      var rotate = Math.random() * 360;

      piece.style.cssText = [
        'left:' + left + '%',
        'width:' + size + 'px',
        'height:' + size + 'px',
        'background:' + color,
        'border-radius:' + (Math.random() > 0.5 ? '50%' : '2px'),
        'animation-duration:' + duration + 's',
        'animation-delay:' + delay + 's',
        'transform:rotate(' + rotate + 'deg)'
      ].join(';');
      container.appendChild(piece);

      (function (el, dur, dly) {
        var total = (dur + dly) * 1000 + 200;
        setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, total);
      })(piece, duration, delay);
    }
  }

  /* ── 启动 ── */
  renderHeader();
  renderAuditCard();
  renderApplyList();
  renderActions();

  createConfetti();
  setTimeout(createConfetti, 700);
})();
</script>
</body>
</html>
