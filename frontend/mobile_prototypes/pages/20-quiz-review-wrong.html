<body>
<div class="prototype-container pad-shell safe-top safe-bottom" data-layout="detail">

  <div class="topbar page-topbar safe-top">
    <a href="20-quiz-result-partial.html" class="icon-btn page-back" aria-label="返回">
      <i data-lucide="arrow-left" class="icon"></i>
    </a>
    <h1 class="topbar-title">错题解析</h1>
    <span class="badge badge-danger shrink-0">1 题</span>
  </div>

  <div class="px-4 mt-3">
    <p class="quiz-tip-banner">只读解析 · 不改变今日正式得分 · 可进入练习模式巩固</p>
  </div>

  <div class="px-4 mt-3 stack-4 pb-28">
    <div class="card card-pad quiz-wrong-item">
      <div class="row items-center gap-2 mb-2 flex-wrap">
        <span class="badge badge-danger">第 3 题 · 答错</span>
        <span class="badge badge-slate">化学 · 三年级</span>
      </div>
      <p class="text-sm font-bold">小苏打与白醋混合会产生什么气体？</p>
      <div class="stack mt-3">
        <div class="option-btn is-answer card card-pad row items-center gap-3">
          <span class="tile-icon tile-sm tint-green">A</span>
          <span class="text-sm">二氧化碳 <span class="text-xs text-success font-bold">（正确答案）</span></span>
        </div>
        <div class="option-btn is-wrong card card-pad row items-center gap-3">
          <span class="tile-icon tile-sm tint-rose">B</span>
          <span class="text-sm">氧气 <span class="text-xs text-danger font-bold">（你的选择）</span></span>
        </div>
        <div class="option-btn disabled card card-pad row items-center gap-3 opacity-60"><span class="tile-icon tile-sm tint-slate">C</span><span class="text-sm">氮气</span></div>
        <div class="option-btn disabled card card-pad row items-center gap-3 opacity-60"><span class="tile-icon tile-sm tint-slate">D</span><span class="text-sm">氢气</span></div>
      </div>
      <div class="surface-2 rounded-xl p-3 mt-3">
        <div class="text-xs font-bold mb-1">💡 解析</div>
        <p class="text-xs muted">小苏打（碳酸氢钠）与醋酸反应会生成二氧化碳气体，这也是「火山喷发」小实验产生气泡的原因。</p>
      </div>
    </div>

    <a href="06-video-detail.html" class="card card-pad card-link row items-center gap-3">
      <div class="tile-icon tile-sm tint-amber">🧪</div>
      <div class="flex-1"><div class="text-sm font-bold">相关实验：小苏打火山</div><p class="text-xs muted mt-1">观看视频巩固理解</p></div>
      <i data-lucide="chevron-right" class="icon muted-2"></i>
    </a>

    <a href="20-quiz-result-partial.html" class="btn btn-outline btn-block">返回答题结果</a>
    <a href="20-quiz.html?mode=practice" class="btn btn-primary btn-block">针对错题练习（不计分）</a>
    <a href="20-quiz-history.html" class="btn btn-ghost btn-block">查看答题记录</a>
  </div>

  <nav class="bottom-nav" aria-label="主导航">
    <div class="nav-items">
      <a href="10-tasks.html" class="nav-item active"><span class="nav-icon"><i data-lucide="clipboard-list" class="icon"></i></span><span class="nav-label">我的任务</span></a>

    </div>
  </nav>
