server:
  port: 8010
  tomcat:
    connection-timeout: 7200000
    # 默认仅 2MB，超过后 Tomcat 直接断开连接，Nginx 表现为 502（与 spring.servlet.multipart 需同时放开）
    max-http-form-post-size: -1
    max-swallow-size: -1

spring:
  datasource:
    url: jdbc:mysql://192.168.102.16:3306/bs_exp_vue?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowMultiQueries=true&allowPublicKeyRetrieval=true
    username: bslab_app
    password: Bslab_app@2026
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB
      file-size-threshold: 2MB
      location: ${java.io.tmpdir}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL5Dialect

app:
  file:
    upload-dir: D:/java/apache-tomcat-file/webapps/ROOT/uploads
    url-prefix: http://127.0.0.1:7080/uploads
  minio:
    endpoint: http://192.168.102.83:9000
    access-key: adminminio
    secret-key: 12345678Abc
    bucket: bslab-media
    url-prefix: http://sysj.bsedu.org.cn/media/bslab-media
    max-file-size: 1048576000
  mobile:
    enabled: true
    static-dir: ../frontend/mobile/dist
    url-prefix: /m
    agents-base-url: ${MOBILE_AGENTS_BASE_URL:http://127.0.0.1:5001}
  dingtalk:
    # 上线开通：DINGTALK_ENABLED=true + CLIENT_ID/SECRET，并在钉钉开放平台登记 redirect_uri
    enabled: ${DINGTALK_ENABLED:false}
    client-id: ${DINGTALK_CLIENT_ID:}
    client-secret: ${DINGTALK_CLIENT_SECRET:}
    # 生产域名示例：https://school.example.com/m ；开发/LAN 示例：http://10.0.1.103:8011/m
    # 完整回调地址：{frontend-origin}/#/settings/dingtalk/callback
    frontend-origin: ${DINGTALK_FRONTEND_ORIGIN:http://sysj.bsedu.org.cn/m}
  jwt:
    secret: ${JWT_SECRET:bs-lab-mobile-dev-secret-change-before-production-2026}
    access-token-seconds: 7200
    refresh-token-seconds: 2592000
    issuer: bs-lab-mobile
  

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql.BasicBinder: trace
